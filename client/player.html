<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div id="waiting">
      <h1>⏳ Ожидание вопроса...</h1>
      <p>Комната: <strong id="roomCode"></strong></p>
    </div>
    <div id="questionBlock" class="hidden">
      <div id="timer" class="timer">⏱️ 15с</div>
      <h1 id="questionText"></h1>
      <div id="questionImage"></div>
      <div id="options" class="options"></div>
      <!-- Кнопка ответа для множественного выбора -->
      <button id="submitAnswerBtn" class="btn btn-blue btn-large hidden" onclick="submitMultipleAnswer()">
        ✅ Ответить
      </button>
    </div>
    <div class="leaderboard">
      <h2>🏆 Лидерборд</h2>
      <ol id="leaderboard"></ol>
    </div>
    <div class="player-actions">
      <a href="dashboard.html" class="btn btn-red btn-small">🚪 Выйти из квиза</a>
    </div>

    <template id="final-screen-template">
      <div class="final-results">
        <h1 class="final-title">🎉 Квиз завершён!</h1>
        <p class="final-subtitle">Спасибо за участие!</p>
        <div class="podium">
          <div class="podium-content"></div>
        </div>
        <div class="leaderboard final-leaderboard">
          <h2>🏆 Финальный лидерборд</h2>
          <ol class="final-leaderboard-list"></ol>
        </div>
        <div class="final-actions">
          <a href="dashboard.html" class="btn btn-blue">← В личный кабинет</a>
          <a href="join.html" class="btn btn-green">🎮 Присоединиться к другому квизу</a>
        </div>
      </div>
    </template>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
