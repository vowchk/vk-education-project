<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои квизы</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Мои квизы</h1>
      <a href="dashboard.html" class="btn btn-blue">← Назад</a>
    </div>
    
    <div id="loading" class="loading">
      <p>Загрузка...</p>
    </div>
    
    <div id="quizzesList" class="hidden"></div>
    
    <div id="emptyState" class="empty-state hidden">
      <h2>У вас пока нет созданных квизов</h2>
      <p>Создайте свой первый квиз и пригласите друзей!</p>
      <a href="create.html" class="btn btn-green">➕ Создать квиз</a>
    </div>
    
    <div id="errorState" class="error-state hidden">
      <h2>Ошибка загрузки</h2>
      <p id="errorMessage"></p>
      <button onclick="loadQuizzes()" class="btn btn-blue">Попробовать снова</button>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/my-quizzes.js"></script>
</body>
</html>
