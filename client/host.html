<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель организатора</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <h1>🎤 Панель организатора</h1>
    
    <!-- Информация о комнате -->
    <div id="roomInfo">
      <div class="room-code">
        Код комнаты: <strong id="roomCode">...</strong>
      </div>
      <p>Участников: <span id="playerCount">0</span></p>
      <p>Всего вопросов: <span id="totalQuestions">0</span></p>
      
      <button onclick="startQuestion()" class="btn btn-blue btn-large" id="startBtn">
        ▶ Запустить вопрос 1
      </button>

      <button onclick="finishQuizEarly()" class="btn btn-red btn-small" id="finishEarlyBtn" style="display: none;">
        🏁 Завершить квиз досрочно
      </button>

      <div class="leaderboard">
        <h2>🏆 Лидерборд</h2>
        <ol id="leaderboard"></ol>
      </div>
    </div>

    <!-- Финальный экран результатов -->
    <div id="finalScreen" class="hidden">
      <div class="final-results">
        <h1>🎉 Квиз завершён!</h1>
        <p class="final-subtitle">Финальные результаты</p>
        
        <div class="podium">
          <div id="podiumContent"></div>
        </div>

        <div class="leaderboard final-leaderboard">
          <h2>🏆 Полный лидерборд</h2>
          <ol id="finalLeaderboard"></ol>
        </div>

        <div class="final-actions">
          <a href="dashboard.html" class="btn btn-blue">← В личный кабинет</a>
          <a href="create.html" class="btn btn-green">➕ Создать новый квиз</a>
          <a href="my-quizzes.html" class="btn btn-blue">📋 Мои квизы</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/host.js"></script>
</body>
</html>
